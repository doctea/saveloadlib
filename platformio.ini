[platformio]
default_envs = native
test_dir = test/native

[env:native]
platform = native
test_framework = unity
test_build_src = yes
test_ignore = test_benchmark
build_flags =
    -std=gnu++17
    -DENABLE_STORAGE
    -Itest/native/stubs

[env:native_bench]
platform = native
test_build_src = yes
build_flags =
    -std=gnu++17
    -O2
    -DENABLE_STORAGE
    -Itest/native/stubs
